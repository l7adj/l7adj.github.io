name: Unpack Prop Firms Site

on:
  push:
    paths:
      - 'site-package.b64'
      - '.github/workflows/unpack-site.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decode and unpack site files
        run: |
          base64 -d site-package.b64 > site.zip
          unzip -o site.zip
          rm -f site.zip site-package.b64

      - name: Commit structured site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Unpack prop firms site into structured folders" || echo "No changes to commit"
          git push
